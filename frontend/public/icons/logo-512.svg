<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 深灰色背景 -->
  <rect width="512" height="512" fill="#2d2d2d"/>

  <!-- 网格线 -->
  <g stroke="white" stroke-width="4" fill="none">
    <!-- 垂直线 -->
    <line x1="128" y1="102" x2="128" y2="410"/>
    <line x1="224" y1="102" x2="224" y2="410"/>
    <line x1="320" y1="102" x2="320" y2="410"/>
    <line x1="416" y1="102" x2="416" y2="410"/>

    <!-- 水平线 -->
    <line x1="102" y1="128" x2="410" y2="128"/>
    <line x1="102" y1="224" x2="410" y2="224"/>
    <line x1="102" y1="320" x2="410" y2="320"/>
    <line x1="102" y1="416" x2="410" y2="416"/>
  </g>

  <!-- 课程块（半透明白色） -->
  <g fill="rgba(255,255,255,0.2)" rx="8">
    <rect x="132" y="106" width="88" height="196" rx="8"/>
    <rect x="228" y="228" width="184" height="88" rx="8"/>
    <rect x="324" y="324" width="88" height="88" rx="8"/>
    <rect x="132" y="420" width="88" height="88" rx="8"/>
    <rect x="420" y="106" width="88" height="88" rx="8"/>
  </g>
</svg>
